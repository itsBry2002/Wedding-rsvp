<!DOCTYPE html>
<html>
<head>

<title>A Journey to “I Do”</title>
<meta name="viewport" content="width=device-width, initial-scale=0.9">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HERO */

.hero{
height:100vh;
background-image:url("engagementRing.jpg");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.overlay{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:12px;
color:white;
}

.overlay h1{
font-size:42px;
margin:0;
}

#countdown{
font-size:24px;
margin-top:10px;
}

/* MUSIC BUTTON */

.music-btn{
position:fixed;
top:20px;
right:20px;
background:#ff4081;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
z-index:999;
}

/* CONTAINER */

.container{
max-width:480px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
}

/* INPUT */

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */

button{
padding:10px 15px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* ATTENDANCE */

.attendance-btn{
width:48%;
margin:5px;
color:white;
opacity:0.8;
}

.attendance-btn[data-value="Yes"]{
background:#28a745;
}

.attendance-btn[data-value="No"]{
background:#dc3545;
}

.attendance-btn.selected{
opacity:1;
transform:scale(1.05);
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
}

/* MAP BUTTON */

.map-btn{
background:#007bff;
color:white;
}

/* UPLOAD BUTTON */

.upload-btn{
background:#6f42c1;
color:white;
}

/* GUEST COUNTER */

#guestCounter{
font-size:20px;
font-weight:bold;
color:#ff4081;
}

/* SCROLL ANIMATION */

.reveal{
opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<audio id="bgmusic" loop>
<source src="Romantic.mp3" type="audio/mp3">
</audio>

<div class="hero">

<div class="overlay">

<h1>A Journey to “I Do”</h1>

<p>Join us for a celebration</p>

<p id="countdown"></p>

</div>

</div>

<div class="container reveal">

<h2>Our Moments</h2>

<div class="gallery">

<img src="engagement1.jpg">
<img src="engagement2.jpg">
<img src="engagement3.jpg">
<img src="engagement4.jpg">

</div>

</div>

<div class="container reveal">

<h2>📍 Event Location</h2>

<a href="https://maps.app.goo.gl/1EP1cqGfqxAmUwqc8" target="_blank">

<button class="map-btn">Open Google Maps</button>

</a>

</div>

<div class="container reveal">

<h2>RSVP</h2>

<form id="rsvpForm">

<input type="text" name="name" placeholder="Your Name" required>

<p>Will you attend?</p>

<button type="button" class="attendance-btn" data-value="Yes">Yes</button>

<button type="button" class="attendance-btn" data-value="No">No</button>

<input type="hidden" name="attendance" id="attendance">

<p>Number of Guests</p>

<select name="numGuests" id="numGuests">

<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>

</select>

<button type="submit" id="submitBtn">Confirm RSVP</button>

</form>

<p id="statusMessage"></p>

</div>

<div class="container reveal">

<h2>Guest Confirmations</h2>

<p id="guestCounter">Loading...</p>

</div>

<div class="container reveal">

<h2>📷 Share Photos</h2>

<a href="https://forms.gle/Vr7EDszuxnV7X8pr8" target="_blank">

<button class="upload-btn">Upload Photos</button>

</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* MUSIC */

function toggleMusic(){

var music=document.getElementById("bgmusic");

if(music.paused){

music.play();

}else{

music.pause();

}

}

/* ATTENDANCE */

const buttons=document.querySelectorAll(".attendance-btn");

const attendance=document.getElementById("attendance");

const guests=document.getElementById("numGuests");

buttons.forEach(btn=>{

btn.addEventListener("click",()=>{

buttons.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

attendance.value=btn.dataset.value;

if(btn.dataset.value==="No"){

guests.disabled=true;

guests.value=0;

}else{

guests.disabled=false;

}

});

});

/* RSVP SUBMIT */

const form=document.getElementById("rsvpForm");

const scriptURL="https://script.google.com/macros/s/AKfycbyF1_vdEaIpKcH83XpD7Uiy2_0Fdye-15lpM8zif7BS_IHnqjSDRQOhAA1eYtuQuIk9uw/exec";

form.addEventListener("submit",e=>{

e.preventDefault();

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(()=>{

confetti({particleCount:120,spread:70,origin:{y:0.6}});

document.getElementById("statusMessage").innerText="Your response is recorded";

form.querySelectorAll("input,select,button").forEach(el=>el.disabled=true);

loadGuests();

});

});

/* GUEST COUNTER */

function loadGuests(){

fetch(scriptURL)
.then(res=>res.json())
.then(data=>{

document.getElementById("guestCounter").innerText=data.count+" Guests Confirmed 🎉";

});

}

loadGuests();

/* COUNTDOWN */

const eventDate=new Date("December 20, 2026 18:00:00").getTime();

setInterval(()=>{

const now=new Date().getTime();

const distance=eventDate-now;

const days=Math.floor(distance/(1000*60*60*24));

document.getElementById("countdown").innerText=days+" Days Until Celebration";

},1000);

/* SCROLL ANIMATION */

function reveal(){

const reveals=document.querySelectorAll(".reveal");

reveals.forEach(section=>{

const windowHeight=window.innerHeight;

const elementTop=section.getBoundingClientRect().top;

if(elementTop < windowHeight - 100){

section.classList.add("active");

}

});

}

window.addEventListener("scroll",reveal);

reveal();

</script>

</body>
</html>
```
